<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Van Phu Tin - Creative Fullstack Software Engineer Portfolio. Premium glassmorphism design with high-performance motion graphics.">

  <!-- Open Graph -->
  <meta property="og:title" content="Van Phu Tin | Fullstack Software Engineer">
  <meta property="og:description"
    content="A cinematic, developer-aesthetic portfolio featuring custom animation physics.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vanphutin.tech">
  <meta property="og:image" content="og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <title>Welcome to VanPhuTin | Portfolio</title>

  <!-- Preconnect & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=3">
</head>

<body>

  <!-- Preloader Screen -->
  <div id="preloader">
    <div class="loader-content">
      <div class="loader-logo">
        <svg viewBox="0 0 24 24" width="40" height="40" aria-hidden="true">
          <defs>
            <linearGradient id="loaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#22d3ee" />
              <stop offset="50%" stop-color="#8b5cf6" />
              <stop offset="100%" stop-color="#ec4899" />
            </linearGradient>
          </defs>
          <path fill="url(#loaderGrad)" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <span class="loader-text">vanphutin loading... 🌸</span>
      </div>
    </div>
  </div>

  <!-- Custom Cursor Rings -->
  <div class="custom-cursor-dot" aria-hidden="true"></div>
  <div class="custom-cursor-ring" aria-hidden="true"></div>

  <!-- Parallax 2D Dust Layer -->
  <canvas id="dustCanvas" aria-hidden="true"></canvas>

  <!-- Spotlight Reveal Overlay -->
  <div class="reveal-mask" aria-hidden="true"></div>

  <!-- Overlay Enhancements -->
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="grid-overlay" aria-hidden="true"></div>

  <!-- Background Glows -->
  <div class="ambient-glow bg-glow-1" aria-hidden="true"></div>
  <div class="ambient-glow bg-glow-2" aria-hidden="true"></div>

  <!-- Pointer interaction light -->
  <div class="cursor-light" aria-hidden="true"></div>

  <!-- Digital Canvas Background -->
  <div id="heart-container">
    <canvas id="heartCanvas" aria-hidden="true"></canvas>
  </div>

  <!-- Single Page: INTRO -->
  <main class="intro-page">
    <section id="intro" class="panel">
      <div class="intro-content">
        <h1 class="cinematic-title">Welcome to VanPhuTin</h1>

        <!-- Role rotator: cycles through roles with smooth transition -->
        <div class="role-rotator" aria-live="polite">
          <span class="role-prefix">I'm a</span>
          <div class="role-carousel">
            <span class="role-text active">Fullstack Software Engineer</span>
          </div>
          <span class="role-cursor" aria-hidden="true">|</span>
        </div>

        <p class="intro-subtext">Code. Design. Build. With Heart.</p>

        <!-- Social links -->
        <div class="intro-actions">
          <a class="primary-action" href="https://github.com/vanphutin" target="_blank" rel="noopener noreferrer" title="GitHub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
            <span class="btn-text">GitHub</span>
          </a>
          <a class="secondary-action" href="https://linkedin.com/in/vanphutin" target="_blank" rel="noopener noreferrer" title="LinkedIn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            <span class="btn-text">LinkedIn</span>
          </a>
          <a class="cta-action" href="mailto:vanphutin2902@gmail.com" title="Email Contact">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <span class="btn-text">Contact</span>
          </a>
        </div>
      </div>
    </section>
  </main>

  <!-- CDNs -->
  <!-- Three.js (WebGL 3D engine) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- GSAP Core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- SVG Organic Liquid Displacement Filters -->
  <svg class="mesh-svg-filters" style="display: none;" aria-hidden="true">
    <defs>
      <filter id="liquid-blur">
        <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="120" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <!-- Main Logic -->
  <script src="script.js"></script>
</body>

</html>
